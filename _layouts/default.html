<!doctype html>
<html lang="en" data-theme="dark" data-resolved-theme="dark">
  {% include head.html %}
  <body>
    <a class="skip-link" href="#content">Skip to content</a>
    <div class="reading-progress" data-reading-progress aria-hidden="true"></div>
    <div class="site-shell">
      {% include header.html %}
      <main id="content" class="site-main">
        {{ content }}
      </main>
      {% include footer.html %}
    </div>

    <div class="image-modal" data-image-modal hidden>
      <button type="button" class="image-modal__close" data-image-modal-close aria-label="Close image preview">
        <span aria-hidden="true">&times;</span>
      </button>
      <img alt="" data-image-modal-img>
    </div>

    {% include script.html %}
  </body>
</html>
