{%- assign name = include.name -%}
{%- assign size = include.size | default: 24 -%}
<svg
  xmlns="http://www.w3.org/2000/svg"
  width="{{ size }}"
  height="{{ size }}"
  viewBox="0 0 24 24"
  fill="none"
  stroke="currentColor"
  stroke-width="2"
  stroke-linecap="round"
  stroke-linejoin="round"
  class="site-icon"
  aria-hidden="true"
>
  {%- case name -%}
  {%- when "arrow-right" -%}
    <path d="M5 12h14"></path>
    <path d="m12 5 7 7-7 7"></path>
  {%- when "calendar-days" -%}
    <path d="M8 2v4"></path>
    <path d="M16 2v4"></path>
    <rect width="18" height="18" x="3" y="4" rx="2"></rect>
    <path d="M3 10h18"></path>
    <path d="M8 14h.01"></path>
    <path d="M12 14h.01"></path>
    <path d="M16 14h.01"></path>
    <path d="M8 18h.01"></path>
    <path d="M12 18h.01"></path>
    <path d="M16 18h.01"></path>
  {%- when "chevron-left" -%}
    <path d="m15 18-6-6 6-6"></path>
  {%- when "chevron-right" -%}
    <path d="m9 18 6-6-6-6"></path>
  {%- when "menu" -%}
    <path d="M4 5h16"></path>
    <path d="M4 12h16"></path>
    <path d="M4 19h16"></path>
  {%- when "monitor" -%}
    <rect width="20" height="14" x="2" y="3" rx="2"></rect>
    <line x1="8" x2="16" y1="21" y2="21"></line>
    <line x1="12" x2="12" y1="17" y2="21"></line>
  {%- when "moon" -%}
    <path d="M20.985 12.486a9 9 0 1 1-9.473-9.472c.405-.022.617.46.402.803a6 6 0 0 0 8.268 8.268c.344-.215.825-.004.803.401"></path>
  {%- when "radio-tower" -%}
    <path d="M4.9 16.1C1 12.2 1 5.8 4.9 1.9"></path>
    <path d="M7.8 4.7a6.14 6.14 0 0 0-.8 7.5"></path>
    <circle cx="12" cy="9" r="2"></circle>
    <path d="M16.2 4.8c2 2 2.26 5.11.8 7.47"></path>
    <path d="M19.1 1.9a9.96 9.96 0 0 1 0 14.1"></path>
    <path d="M9.5 18h5"></path>
    <path d="m8 22 4-11 4 11"></path>
  {%- when "sun" -%}
    <circle cx="12" cy="12" r="4"></circle>
    <path d="M12 2v2"></path>
    <path d="M12 20v2"></path>
    <path d="m4.93 4.93 1.41 1.41"></path>
    <path d="m17.66 17.66 1.41 1.41"></path>
    <path d="M2 12h2"></path>
    <path d="M20 12h2"></path>
    <path d="m6.34 17.66-1.41 1.41"></path>
    <path d="m19.07 4.93-1.41 1.41"></path>
  {%- when "tag" -%}
    <path d="M12.586 2.586A2 2 0 0 0 11.172 2H4a2 2 0 0 0-2 2v7.172a2 2 0 0 0 .586 1.414l8.704 8.704a2.426 2.426 0 0 0 3.42 0l6.58-6.58a2.426 2.426 0 0 0 0-3.42z"></path>
    <circle cx="7.5" cy="7.5" r=".5" fill="currentColor"></circle>
  {%- when "user-round" -%}
    <circle cx="12" cy="8" r="5"></circle>
    <path d="M20 21a8 8 0 0 0-16 0"></path>
  {%- endcase -%}
</svg>
