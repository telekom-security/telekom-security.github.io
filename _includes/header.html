<header class="site-header">
  <div class="site-header__inner">
    <a class="brand" href="{{ "/" | relative_url }}" aria-label="Telekom Security home">
      <span class="brand__mark">Telekom</span>
      <span class="brand__name">Security</span>
    </a>

    <nav class="site-nav" id="site-nav" aria-label="Main navigation">
      {%- for item in site.navigation %}
        {%- assign item_url = item.url | relative_url -%}
        {%- assign current_url = page.url | relative_url -%}
        <a href="{{ item_url }}"{% if current_url == item_url or page.url == item.url %} aria-current="page"{% endif %}>{{ item.title }}</a>
      {%- endfor %}
      <a class="site-nav__social" href="https://www.linkedin.com/showcase/technical-security-insights-t-security/" aria-label="Technical Security Insights on LinkedIn">
        <span class="site-nav__social-icon" aria-hidden="true"></span>
      </a>
    </nav>

    <div class="header-actions">
      <button
        class="theme-toggle"
        type="button"
        data-theme-toggle
        data-theme-value="dark"
        aria-label="Theme: Dark. Activate for Light."
      >
        <span class="theme-toggle__icon theme-toggle__icon--system" aria-hidden="true">
          {% include icon.html name="monitor" size="17" %}
        </span>
        <span class="theme-toggle__icon theme-toggle__icon--light" aria-hidden="true">
          {% include icon.html name="sun" size="17" %}
        </span>
        <span class="theme-toggle__icon theme-toggle__icon--dark" aria-hidden="true">
          {% include icon.html name="moon" size="17" %}
        </span>
      </button>

      <button
        class="nav-toggle"
        type="button"
        aria-expanded="false"
        aria-controls="site-nav"
        aria-label="Open navigation"
      >
        {% include icon.html name="menu" size="20" %}
      </button>
    </div>
  </div>
</header>
